project:
  type: website
  output-dir: _site
  resources:
    - CNAME

website:
  title: "David Maguire"
  description: "A public research notebook in quantitative finance, machine learning, and AI."
  site-url: "https://davidmaguire.ai"
  favicon: assets/favicon.svg
  search: true
  navbar:
    pinned: true
    left:
      - text: "About"
        href: about.qmd
      - text: "Equations"
        href: equations/index.qmd
      - text: "Machine Learning"
        href: ml/index.qmd
      - text: "Quant Lab"
        href: quant-lab/index.qmd
      - text: "AI Systems"
        href: ai-systems/index.qmd
      - text: "PhD"
        href: phd/index.qmd
      - text: "Code"
        href: code.qmd
    right:
      - icon: github
        href: "https://github.com/davidolivermaguire-ai"
        aria-label: GitHub
      - icon: envelope
        href: "mailto:davidolivermaguire@gmail.com"
        aria-label: Email
  page-footer:
    border: true
    left: "© 2026 David Maguire"
    center: "A public research notebook · [GitHub](https://github.com/davidolivermaguire-ai)"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      - cosmo
      - styles/theme.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    html-math-method: katex
    highlight-style: github
    link-external-newwindow: true
    grid:
      body-width: 900px

execute:
  enabled: false
